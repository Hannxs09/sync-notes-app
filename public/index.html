<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync Notes</title>
<link rel="manifest" href="manifest.json">
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f7f7f7;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  .app-container {
    width: 95%;
    max-width: 450px;
    margin: 30px 10px;
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    box-sizing: border-box;
  }

  h1 {
    text-align: center;
    color: #333;
    font-size: 1.5rem;
    margin-bottom: 20px;
  }

  .input-container {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  #noteInput {
    flex: 1;
    padding: 10px 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1rem;
    box-sizing: border-box;
    min-width: 0;
  }

  .save-btn {
    background-color: #4CAF50;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.3s;
    flex: 0 0 auto;
    white-space: nowrap;
  }

  .save-btn:hover { background-color: #45a049; }

  #notes { list-style-type: none; padding: 0; margin: 0; }

  #notes li {
    background: #e0f7fa;
    margin-bottom: 10px;
    padding: 10px 15px;
    border-radius: 10px;
    word-wrap: break-word;
    position: relative;
    font-size: 1rem;
  }

  .delete-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    padding: 2px 6px;
    cursor: pointer;
    font-size: 0.8rem;
  }

  .delete-btn:hover { background: darkred; }

  /* Mobile Anpassungen */
  @media (max-width: 400px) {
    .input-container {
      flex-direction: column;
    }
    #noteInput, .save-btn {
      width: 100%;
    }
  }
</style>
</head>
<body>
<div class="app-container">
  <h1>Meine Notizen</h1>
  <div class="input-container">
    <input id="noteInput" placeholder="Neue Notiz">
    <button class="save-btn" onclick="addNote()">Speichern</button>
  </div>
  <ul id="notes"></ul>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io()
  const list = document.getElementById("notes")
  const noteInput = document.getElementById("noteInput")

  function addNote(){
    const text = noteInput.value.trim()
    if(text){
      socket.emit("newNote", text)
      noteInput.value = ""
    }
  }

  if ("Notification" in window) {
    Notification.requestPermission().then(permission => console.log("Notification permission:", permission))
  }

  function createNoteElement(note){
    const li = document.createElement("li")
    li.textContent = note

    const delBtn = document.createElement("button")
    delBtn.textContent = "✖"
    delBtn.className = "delete-btn"
    delBtn.onclick = () => {
      li.remove()
      socket.emit("deleteNote", note)
    }
    li.appendChild(delBtn)
    return li
  }

  socket.on("noteAdded", note => {
    list.appendChild(createNoteElement(note))
    if(Notification.permission === "granted") new Notification("Neue Notiz", { body: note, icon: "/icon.png" })
  })

  socket.on("loadNotes", notes => {
    list.innerHTML = ""
    notes.forEach(note => list.appendChild(createNoteElement(note)))
  })

  socket.on("noteDeleted", note => {
    Array.from(list.children).forEach(li => {
      if(li.firstChild.nodeValue === note) li.remove()
    })
  })

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js")
      .then(() => console.log("Service Worker registriert"))
      .catch(err => console.log("Service Worker Fehler", err))
  }
</script>
</body>
</html>
